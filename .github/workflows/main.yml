name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all presets
        run: |
          chmod +x compile-with-docker.sh
          ./compile-with-docker.sh All

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bafang-firmware-${{ github.sha }}
          path: build/*/*.bin
